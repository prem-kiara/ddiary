<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241005"/>
      <stop offset="100%" stop-color="#0D0502"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D070"/>
      <stop offset="100%" stop-color="#8B6010"/>
    </linearGradient>
    <linearGradient id="page" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#E8D4A8"/>
      <stop offset="100%" stop-color="#FCF5E4"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Left page -->
  <polygon points="14,21 48,18 48,80 14,82" fill="url(#page)"/>
  <!-- Right page -->
  <polygon points="86,21 52,18 52,80 86,82" fill="url(#page)"/>
  <!-- Spine -->
  <rect x="47" y="18" width="6" height="62" fill="url(#gold)"/>
  <!-- Lines left page -->
  <line x1="19" y1="31" x2="44" y2="30" stroke="#C9A050" stroke-width="1" opacity="0.55"/>
  <line x1="19" y1="39" x2="44" y2="38" stroke="#C9A050" stroke-width="1" opacity="0.55"/>
  <line x1="19" y1="47" x2="44" y2="46" stroke="#C9A050" stroke-width="1" opacity="0.55"/>
  <line x1="19" y1="55" x2="38" y2="54" stroke="#C9A050" stroke-width="1" opacity="0.55"/>
  <line x1="19" y1="63" x2="44" y2="62" stroke="#C9A050" stroke-width="1" opacity="0.55"/>
  <!-- Quill on right page -->
  <line x1="78" y1="23" x2="57" y2="72" stroke="#D4A030" stroke-width="1.5" opacity="0.85"/>
  <line x1="78" y1="23" x2="60" y2="52" stroke="#F0C855" stroke-width="0.8" opacity="0.6"/>
  <line x1="74" y1="28" x2="60" y2="55" stroke="#F0C855" stroke-width="0.8" opacity="0.5"/>
  <line x1="70" y1="34" x2="59" y2="58" stroke="#F0C855" stroke-width="0.8" opacity="0.5"/>
  <polygon points="57,72 54,78 60,70" fill="#7A4A05"/>
  <!-- Bookmark -->
  <polygon points="80,18 86,18 86,34 83,30 80,34" fill="url(#gold)" opacity="0.85"/>
</svg>
