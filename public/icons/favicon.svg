<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="pageShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded violet tile -->
  <rect width="100" height="100" rx="22" fill="url(#tile)"/>

  <!-- Notebook page -->
  <g filter="url(#pageShadow)">
    <rect x="22" y="18" width="56" height="68" rx="6" fill="url(#page)"/>
  </g>

  <!-- Binding dots (left spine) -->
  <circle cx="27" cy="28" r="1.6" fill="#c4b5fd"/>
  <circle cx="27" cy="38" r="1.6" fill="#c4b5fd"/>
  <circle cx="27" cy="48" r="1.6" fill="#c4b5fd"/>
  <circle cx="27" cy="58" r="1.6" fill="#c4b5fd"/>
  <circle cx="27" cy="68" r="1.6" fill="#c4b5fd"/>
  <circle cx="27" cy="78" r="1.6" fill="#c4b5fd"/>

  <!-- Title bar -->
  <rect x="34" y="27" width="36" height="4" rx="2" fill="#7c3aed"/>

  <!-- Content lines -->
  <rect x="34" y="38" width="36" height="2.2" rx="1.1" fill="#cbd5e1"/>
  <rect x="34" y="44" width="32" height="2.2" rx="1.1" fill="#cbd5e1"/>
  <rect x="34" y="50" width="36" height="2.2" rx="1.1" fill="#cbd5e1"/>
  <rect x="34" y="56" width="28" height="2.2" rx="1.1" fill="#cbd5e1"/>

  <!-- Check accent (task done) -->
  <circle cx="40" cy="72" r="6" fill="#ede9fe"/>
  <path d="M36.8 72.2 L39.4 74.6 L43.4 70.0"
        stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="49" y="70.5" width="21" height="2.2" rx="1.1" fill="#cbd5e1"/>
</svg>
